<div class="view-header">
    <p>Catálogo global de cursos homologados y tipos de formación.</p>
    <div style="display: flex; gap: 10px;">
        <button id="btn-nuevo-tipo" class="btn btn--secondary">+ Añadir Curso al Catálogo</button>
    </div>
</div>

<div class="data-table-wrapper">
    <table class="data-table">
        <thead>
            <tr>
                <th width="25%">Nombre del Curso</th>
                <th width="25%">Entidad Formadora</th>
                <th width="15%">Validez (Años)</th>
                <th width="20%">Descripción</th>
                <th width="15%">Acciones</th>
            </tr>
        </thead>
        <tbody id="lista-tipos-formacion"></tbody>
    </table>
</div>

<div id="modal-tipo-formacion" class="modal">
    <div class="modal__content modal__content--small">
        <div class="modal__header">
            <h2>Curso del Catálogo</h2>
            <button id="btn-cerrar-tipo" class="btn--icon">&times;</button>
        </div>
        <div class="modal__body">
            <form id="form-tipo-formacion">
                <input type="hidden" id="form-tipo-id">
                <div class="form-group">
                    <label class="form-label">Nombre del Curso *</label>
                    <input type="text" id="form-tipo-nombre" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Entidad Formadora</label>
                    <input type="text" id="form-tipo-entidad" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Validez en Años (0 = No caduca) *</label>
                    <input type="number" id="form-tipo-validez" class="form-control" required min="0" value="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Descripción</label>
                    <textarea id="form-tipo-descripcion" class="form-control" rows="2"></textarea>
                </div>
            </form>
        </div>
        <div class="modal__footer">
            <button type="submit" form="form-tipo-formacion" class="btn btn--primary">Guardar Curso</button>
        </div>
    </div>
</div>
