<div class="view-header">
    <p>Registro de formación y seguimiento de caducidades de la plantilla activa.</p>
    <div style="display: flex; gap: 10px;">
        <button id="btn-nueva-formacion" class="btn btn--primary">+ Registrar Formación a Trabajador</button>
    </div>
</div>

<div class="data-table-wrapper">
    <table class="data-table">
        <thead>
            <tr>
                <th width="25%">Trabajador</th>
                <th width="25%">Curso Realizado</th>
                <th width="15%">Fecha Realización</th>
                <th width="15%">Fecha Caducidad</th>
                <th width="20%">Acciones</th>
            </tr>
        </thead>
        <tbody id="lista-formaciones"></tbody>
    </table>
</div>

<div id="modal-formacion" class="modal">
    <div class="modal__content modal__content--small">
        <div class="modal__header">
            <h2>Registro de Formación</h2>
            <button id="btn-cerrar-formacion" class="btn--icon">&times;</button>
        </div>
        <div class="modal__body">
            <form id="form-formacion">
                <input type="hidden" id="form-formacion-id">
                <div class="form-group form-group--full">
                    <label class="form-label">Trabajador *</label>
                    <select id="form-formacion-trabajador" class="form-control" required></select>
                </div>
                <div class="form-group form-group--full">
                    <label class="form-label">Curso Realizado *</label>
                    <select id="form-formacion-curso" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Fecha de Realización *</label>
                    <input type="date" id="form-formacion-fecha" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Fecha de Caducidad</label>
                    <input type="date" id="form-formacion-caducidad" class="form-control">
                </div>
            </form>
        </div>
        <div class="modal__footer">
            <button type="submit" form="form-formacion" class="btn btn--primary">Guardar Registro</button>
        </div>
    </div>
</div>
